<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sleep Experiment | คืนก่อนวันฉิมประดิษฐ์</title>
    <!-- ใช้ฟอนต์ Prompt (ไม่มีหัว) ให้ดูร่วมสมัยแต่เย็นชา -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@200;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #b3b3b3;
            --highlight: #ffffff;
            --blood: #7a0000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Prompt', sans-serif;
            overflow: hidden; /* ป้องกันการเลื่อนจอ */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* เอฟเฟกต์ฟิล์มเก่าและนอยส์ */
        .noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
            z-index: 10;
        }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 11;
        }

        #game-container {
            max-width: 800px;
            width: 90%;
            text-align: center;
            z-index: 20;
            position: relative;
        }

        .date-text {
            font-size: 1rem;
            color: var(--blood);
            letter-spacing: 3px;
            margin-bottom: 20px;
            animation: pulse 3s infinite;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 200;
            color: var(--highlight);
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .choice-btn {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 15px auto;
            padding: 15px 20px;
            background: transparent;
            border: 1px solid #333;
            color: var(--text-color);
            font-family: 'Prompt', sans-serif;
            font-size: 1.1rem;
            font-weight: 200;
            cursor: pointer;
            transition: all 0.4s ease;
            text-align: center;
        }

        .choice-btn:hover {
            border-color: var(--highlight);
            color: var(--highlight);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
            transform: scale(1.02);
        }

        .choice-btn.danger:hover {
            border-color: var(--blood);
            color: #fff;
            background-color: rgba(122, 0, 0, 0.1);
            box-shadow: 0 0 15px rgba(122,0,0,0.3);
        }

        #story-screen {
            display: none;
            opacity: 0;
            transition: opacity 2s ease;
            text-align: left;
            line-height: 1.8;
            font-size: 1.1rem;
            font-weight: 200;
            max-height: 80vh;
            overflow-y: auto;
            padding-right: 15px;
        }

        /* แต่ง Scrollbar ให้ดูมืดๆ */
        #story-screen::-webkit-scrollbar { width: 5px; }
        #story-screen::-webkit-scrollbar-track { background: #000; }
        #story-screen::-webkit-scrollbar-thumb { background: #333; }

        .story-text {
            margin-bottom: 30px;
        }

        .fade-in {
            animation: fadeIn 2s forwards;
        }

        .restart-btn {
            margin-top: 40px;
            font-size: 0.9rem;
            border: none;
            border-bottom: 1px solid #555;
            padding: 5px;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* สำหรับมือถือ */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .choice-btn { font-size: 1rem; padding: 12px; }
            #story-screen { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <!-- ซาวด์แอมเบียนต์เสียงพัดลมเก่าๆ ผสมเสียงความถี่ต่ำ -->
        <source src="https://assets.mixkit.co/music/preview/mixkit-creepy-background-tension-248.mp3" type="audio/mpeg">
    </audio>

    <div class="noise"></div>
    <div class="vignette"></div>

    <div id="game-container">
        <!-- หน้าแรก -->
        <div id="start-screen">
            <div class="date-text">คืนวันนี้ พฤษภาคม... ใกล้เข้าสู่วันฉิมประดิษฐ์</div>
            <h1>คุณกำลังจะหลับตาลง...</h1>
            
            <button class="choice-btn" onclick="chooseNoDream()">หลับลึกโดยไร้การนึกคิด</button>
            <button class="choice-btn danger" onclick="chooseDream()">ปล่อยให้ความฝันกลืนกิน</button>
        </div>

        <!-- หน้าแสดงผลความฝัน -->
        <div id="story-screen">
            <div id="story-content" class="story-text"></div>
            <button class="choice-btn restart-btn" onclick="location.reload()">ลืมตาตื่น...</button>
        </div>
    </div>

    <script>
        const dreams = [
            // 1. เพชฌฆาตในห้องพัก
            "คุณรู้สึกตัวในห้องพักของตัวเอง แอร์ยังคงเป่าลมเย็นเฉียบ แต่ที่ปลายเตียง... มีชายร่างใหญ่ยืนหันหลังให้ ผิวกายของเขาคล้ำเข้ม นุ่งโจงกระเบนสีแดงหม่น บนบ่าแบกดาบเหล็กเล่มใหญ่ที่ขึ้นสนิมกรัง เสียงหยดน้ำ... ไม่สิ เสียงเลือดหยดลงบนพื้นกระเบื้องดัง 'ติ๋ง... ติ๋ง...' เขาค่อยๆ หันหน้ามาหาคุณ ดวงตาของเขาขาวโพลนไร้ตาดำ ก่อนจะแสยะยิ้มและพูดด้วยเสียงแหบพร่า 'พานฉิมประดิษฐ์ปีนี้... ยังขาดหัวเครื่องเซ่น...' เขาเงื้อดาบขึ้นสุดแขน ก่อนที่ใบดาบจะสับลงมาตรงหน้าคุณ!",
            
            // 2. สิบศิลป์และเจ้าเบญจันทร์
            "คุณหลงเข้าไปในเขตพระราชฐานโบราณสมัยอยุธยา บรรยากาศเงียบสงัดจนน่าขนลุก ท่ามกลางหมอกควันสีขาว คุณเห็นชายหนุ่มรูปงามสวมเครื่องทรงโบราณเต็มยศ นามของเขาคือ 'สิบศิลป์' เขากำลังคุกเข่าถวายพานดอกไม้ที่เหี่ยวเฉาแด่ 'เจ้าเบญจันทร์' ผู้ประทับอยู่บนตั่งไม้สูง... แต่เมื่อคุณมองใกล้ๆ ตั่งไม้นั้นกลับทำมาจากกระดูกมนุษย์ เจ้าเบญจันทร์ปรายตามองมาที่คุณ พระหัตถ์ที่ซีดเผือดผายออก พร้อมตรัสด้วยน้ำเสียงเย็นเยียบ 'ถึงเวลาที่เจ้าต้องมาถวายตัวแล้ว...'",
            
            // 3. นางรำไร้หน้าในตู้เสื้อผ้า
            "คุณฝันว่าตัวเองตื่นขึ้นมากลางดึกเพราะเสียงดนตรีไทยแว่วมาจากมุมห้อง ต้นเสียงมาจาก 'ตู้เสื้อผ้า' ของคุณเอง บานประตูตู้ค่อยๆ แง้มออก... เผยให้เห็นชุดรำไทยสีทองที่แขวนอยู่ มันเริ่มขยับเอง มือที่มองไม่เห็นร่ายรำไปตามจังหวะช้าๆ ก่อนที่ชุดนั้นจะค่อยๆ ลอยออกมาจากตู้ ตรงมาที่เตียงของคุณ เสียงกำไลข้อเท้าดังกรุ๊งกริ๊ง... ชุดนั้นคร่อมทับร่างคุณไว้ และคุณก็ตระหนักว่า... มันกำลังพยายามจะสวมใส่ตัวคุณจากภายนอก!",
            
            // 4. โมเดลสถาปัตย์สีเลือด
            "คุณกำลังนั่งดูคนตัดโมเดลกระดาษเพื่อส่งงานคณะสถาปัตย์ ทุกอย่างดูปกติจนกระทั่งคุณสังเกตเห็นว่า หุ่นฟิกเกอร์สเกล 1:100 ที่คุณวางไว้ในโมเดล เริ่มขยับหัวได้ พวกมันทั้งหมดพร้อมใจกันหันหน้ามามองคุณจ้องเขม็ง จากนั้นของเหลวสีแดงสดก็ค่อยๆ ซึมออกมาจากตัวหุ่นเหล่านั้น ไหลเจิ่งนองทับกระดาษชานอ้อย เสียงเล็กแหลมนับร้อยเสียงดังระงมขึ้นพร้อมกัน 'สร้างศาลให้พวกกู... สร้างศาลให้พวกกู...'",
            
            // 5. ดินปั้นพานไหว้ครู
            "ในฝัน คุณนั่งอยู่กลางลานกว้าง กำลังปั้นดินเหนียวเพื่อเตรียมทำฐานพานวันฉิมประดิษฐ์ แต่ยิ่งคุณนวดดิน ดินก็ยิ่งอุ่นและนิ่มเหมือนเนื้อคน ทันใดนั้น ดินเหนียวในมือก็เริ่มเต้นตุบๆ ตามจังหวะหัวใจ คุณพยายามจะสะบัดทิ้ง แต่มันกลับงอก 'นิ้วมือ' ออกมารัดข้อมือคุณไว้แน่น เสียงกระซิบดังขึ้นจากก้อนดินว่า 'อย่าทิ้งกู... เอาเนื้อกูไปประดิษฐ์พาน...'",
            
            // 6. บทกลอนแปดวิปลาส
            "คุณนอนขยับตัวไม่ได้  น้ำหนักมหาศาลกดทับที่หน้าอก เมื่อลืมตาขึ้น คุณเห็นใบหน้าที่เน่าเปื่อยของหญิงชราคนหนึ่งห้อยหัวลงมาจากเพดาน หน้าของเธออยู่ห่างจากจมูกคุณเพียงคืบ เธอแสยะยิ้มจนเห็นเหงือกสีดำ แล้วเริ่มท่องบทกลอนแปดด้วยน้ำเสียงยานคาง แต่เนื้อหาในกลอนกลับเป็นการพรรณนาถึงวิธีการชำแหละศพของคุณอย่างวิจิตรบรรจง... เธอหยุดท่องในวรรคสุดท้าย แล้วกระซิบว่า 'ต่อกลอนให้จบสิ... ไม่งั้นมึงตาย'",
            
            // 7. กระจกเงาของเพชฌฆาต
            "คุณเดินเข้าไปล้างหน้าในห้องน้ำของหอพัก เมื่อเงยหน้ามองกระจก ภาพสะท้อนกลับไม่ใช่ตัวคุณ... แต่เป็นชายร่างกำยำ รอยสักยันต์เต็มตัว สวมผ้าเตี่ยวสีแดง (เพชฌฆาต) เขากำลังยืนอยู่ข้างหลังคุณในกระจก ในมือถือขวานเล่มใหญ่ที่เปื้อนคราบเลือดแห้งกรัง เขาไม่พูดอะไร ได้แต่ยิ้มกว้างจนปากฉีกถึงหู แล้วค่อยๆ ยกขวานขึ้นช้าๆ... ในโลกความเป็นจริง คุณพยายามจะหันหลังกลับไปมอง แต่ร่างกายกลับถูกสะกดให้จ้องมองได้แค่ในกระจกเท่านั้น",
            
            // 8. รอยเท้าโคลนสีแดง
            "คุณฝันว่าตื่นขึ้นมากลางดึกเพราะหิวน้ำ เมื่อก้าวเท้าลงจากเตียง คุณสัมผัสได้ถึงความเฉอะแฉะ พื้นห้องของคุณเต็มไปด้วย 'โคลนสีแดงสด' กลิ่นเหม็นสาบสางคละคลุ้งไปทั่ว คุณพยายามเดินไปเปิดไฟ แต่กลับพบว่ามีรอยเท้าของใครบางคน... หรือบางสิ่ง... เดินวนรอบเตียงคุณนับร้อยรอบ และรอยเท้าสุดท้าย... มันหยุดอยู่ตรงหน้าคุณพอดี พร้อมกับลมหายใจเย็นๆ ที่รดต้นคอ",
            
            // 9. ลิฟต์ชั้นที่ไม่มีอยู่จริง
            "คุณกำลังขึ้นลิฟต์ในหอพักเพื่อกลับห้อง ตัวเลขชั้นเลื่อนขึ้นไปเรื่อยๆ จนถึงชั้น 13 (ซึ่งหอคุณมีแค่ 8 ชั้น) ประตูลิฟต์เปิดออกสู่ความมืดมิด มีเพียงแสงไฟกะพริบติดๆ ดับๆ จากโถงทางเดิน คุณเห็นเหล่านักศึกษาสวมชุดรำไทยยืนเรียงรายอยู่สองข้างทาง ทุกคนก้มหน้า ไม่มีใครมีเงาทอดลงพื้น ทันทีที่คุณก้าวเท้าออกไป ประตูลิฟต์ด้านหลังก็ปิดลงอย่างแรง และนักศึกษาทั้งหมดก็พร้อมใจกันเงยหน้าขึ้นมา... ใบหน้าของพวกเขาว่างเปล่า ไร้หู ตา จมูก ปาก",
            
            // 10. ระเบียงห้องตรงข้าม
            "คุณนอนตะแคงมองออกไปทางประตูกระจกหน้าระเบียงห้อง ที่ตึกฝั่งตรงข้าม มีนักศึกษาคนหนึ่งกำลังยืนอยู่บนขอบระเบียงชั้นสูงสุด เขากำลังร่ายรำ 'พิธีไล่ฝน' ด้วยท่วงท่าที่บิดเบี้ยวเกินกว่ามนุษย์จะทำได้ กระดูกแขนและขาหักงอผิดรูป ทันใดนั้น เขาก็ทิ้งตัวดิ่งลงมา! แต่แทนที่ร่างจะตกกระแทกพื้น ร่างนั้นกลับพุ่ง 'ลอยข้ามตึก' ทะลุกระจกระเบียงเข้ามาในห้องของคุณ และหยุดยืนอยู่ปลายเตียง!",
            
            // 11. ฝันดี (The Good Dream)
            "คุณฝันเห็นลานกว้างในวันที่แสงแดดอบอุ่น สายลมพัดผ่านเบาๆ พัดเอาความเหนื่อยล้าทั้งหมดปลิวหายไป ใครบางคนในชุดขาวสะอาดตากำลังยื่น 'พานฉิมประดิษฐ์' ที่จัดเรียงอย่างงดงามไร้ที่ติมาให้คุณ แม้จะมองหน้าเขาไม่ชัด แต่คุณรับรู้ได้ถึงความเมตตาและอบอุ่น เสียงทุ้มนุ่มนวลกระซิบข้างหูว่า 'ไม่ต้องกลัว พรุ่งนี้ทุกอย่างจะราบรื่น ครูบาอาจารย์คุ้มครอง...' คุณหลับลึกและรู้สึกปลอดภัยที่สุดในรอบหลายปี",
            
            // 12. ลานประหารวันฉิมประดิษฐ์
            "คุณถูกจับมัดติดกับหลักไม้กลางลานดินกว้าง ท้องฟ้าเบื้องบนเป็นสีแดงฉานเหมือนเลือด เพชฌฆาตดาบสองมือเดินวนรอบตัวคุณ เขากำลังร่ายรำด้วยท่าทางที่งดงามแต่แฝงไปด้วยความตาย เสียงกลองปี่พาทย์บรรเลงจังหวะเร่งเร้าขึ้นเรื่อยๆ เพชฌฆาตหยุดรำ นำดินเหนียวมาอุดหูอุดตาคุณ แล้วกระซิบด้วยเสียงหัวเราะในลำคอว่า 'ได้เวลาสังเวยฤกษ์งามยามดี... วันฉิมประดิษฐ์แล้วไอ้อีทั้งหลาย!'",
            
            // 13. เส้นหมึกบนผิวกาย
            "คุณฝันว่าตัวเองฟุบหลับอยู่หน้าจอคอมพิวเตอร์ที่เปิดโปรแกรมวาดภาพเว็บตูนค้างไว้ แต่เมื่อคุณเงยหน้าขึ้น คุณพบว่ามีเงาดำร่างสูงกำลังใช้เข็มสักที่แหลมคม วาดเส้นสายสไตล์มันฮวาลงบนแขนของคุณ เลือดซึมออกมาตามรอยเข็ม แต่คุณกลับขยับตัวหนีไม่ได้ เงาดำนั้นจับคางคุณให้หันไปมองผลงาน แล้วกระซิบว่า 'เส้นสายของมึงสวยดีนะ... ขอกูเอาหนังมึงไปทำพื้นหลังหน่อยก็แล้วกัน...'",
            
            // 14. เสียงเคาะจากใต้เตียง
            "คุณนอนคว่ำหน้าอยู่บนเตียงในหอพัก ทุกอย่างเงียบสงบ จนกระทั่งมีเสียง 'ก๊อก... ก๊อก... ก๊อก...' ดังมาจากใต้ที่นอนของคุณ คุณพยายามทำใจดีสู้เสือ คิดว่าเป็นเสียงหนู แต่แล้ว... ที่นอนก็ถูกดันนูนขึ้นมาจากด้านล่าง ตรงกับตำแหน่งหน้าอกของคุณพอดี รอยนูนนั้นมีรูปร่างเหมือนใบหน้าคน มันค่อยๆ อ้าปากกว้างทะลุเนื้อผ้าปูที่นอนออกมา พร้อมกับพ่นเส้นผมเปียกชุ่มจำนวนมากใส่หน้าคุณ!",
            
            // 15. วงล้อมแห่งหอพ่อแก่
            "คุณพบว่าตัวเองยืนอยู่กลางห้องเก็บเศียรพ่อแก่ ทุกเศียรที่วางอยู่บนชั้นถูกจัดให้หันหน้ามาตรงกลาง... มองมาที่คุณ เสียงดนตรีไทยบรรเลงขึ้นโดยไม่มีนักดนตรี ทันใดนั้น เศียรทั้งหมดก็ค่อยๆ ลอยขึ้นจากชั้นวาง บินวนรอบตัวคุณอย่างรวดเร็วเป็นวงกลม เสียงหัวเราะเยือกเย็นดังก้องไปทั่วห้อง คุณพยายามหลับตาและอุดหู แต่เสียงหนึ่งกลับดังแทรกเข้ามาในหัวคุณชัดเจน 'มึงหนีพวกกูไม่พ้นหรอก... วันฉิมประดิษฐ์นี้ มึงต้องมารำถวายพวกกู... ตลอดกาล!'"
        ];

        function playAudio() {
            const audio = document.getElementById("bg-music");
            audio.volume = 0.4;
            // เบราว์เซอร์ส่วนใหญ่อนุญาตให้เล่นเสียงหลังจากผู้ใช้โต้ตอบกับหน้าเว็บ (กดปุ่ม)
            audio.play().catch(e => console.log("Audio play prevented by browser policy."));
        }

        function chooseNoDream() {
            playAudio();
            const container = document.getElementById('start-screen');
            container.style.opacity = '0';
            
            setTimeout(() => {
                container.style.display = 'none';
                const storyScreen = document.getElementById('story-screen');
                storyScreen.style.display = 'block';
                
                // ผลลัพธ์แบบไม่ฝัน
                document.getElementById('story-content').innerHTML = `
                    <p style="color: #666; font-style: italic;">คุณเลือกที่จะหลับตาลงและปิดกั้นทุกสัมผัส...</p>
                    <p>คุณตื่นขึ้นมาในเช้าวันที่ ๑๓ พฤษภาคม วันฉิมประดิษฐ์ แสงแดดลอดผ่านผ้าม่านเข้ามา ร่างกายของคุณปกติดีทุกอย่าง ไม่มีความฝัน ไม่มีภาพหลอน</p>
                    <p>คุณลุกขึ้นไปล้างหน้า แปรงฟัน เตรียมตัวออกไปพิธี...</p>
                    <p>แต่ลึกๆ ในใจ คุณกลับมีความรู้สึกเยียบเย็นบางอย่างเกาะกินอยู่... ความรู้สึกที่เหมือนกับว่าตลอดทั้งคืนที่คุณหลับสนิท <strong>มีใครบางคน... หรือหลายคน... ยืนจ้องมองคุณอยู่ที่ปลายเตียงโดยไม่ได้ขยับไปไหนเลย</strong></p>
                `;
                
                // Fade in text
                setTimeout(() => {
                    storyScreen.style.opacity = '1';
                }, 100);
            }, 1000);
        }

        function chooseDream() {
            playAudio();
            const container = document.getElementById('start-screen');
            container.style.opacity = '0';
            
            // สุ่มความฝัน 1 ใน 15
            const randomIndex = Math.floor(Math.random() * dreams.length);
            const selectedDream = dreams[randomIndex];
            
            setTimeout(() => {
                container.style.display = 'none';
                const storyScreen = document.getElementById('story-screen');
                storyScreen.style.display = 'block';
                
                document.getElementById('story-content').innerHTML = `
                    <p style="color: var(--blood); font-style: italic;">คุณหลุดลอยเข้าสู่ห้วงนิทรา... และความฝันก็เริ่มต้นขึ้น</p>
                    <p class="fade-in" style="animation-delay: 1s;">${selectedDream}</p>
                `;
                
                // Fade in text
                setTimeout(() => {
                    storyScreen.style.opacity = '1';
                }, 100);
            }, 1000);
        }
    </script>
</body>
</html>
