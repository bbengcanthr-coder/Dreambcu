<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Paralysis | ภาวะหลับ(ไม่)ฝัน</title>
    <!-- ใช้ฟอนต์ไม่มีหัว Kanit เพื่อความสยองขวัญแบบร่วมสมัย -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #a8a8a8;
            --text-highlight: #ffffff;
            --blood-red: #660000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Kanit', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* เอฟเฟกต์หน้าจอจุดสีดำๆ แบบทีวีเสีย */
        .static-noise {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/black-paper.png');
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 700px;
            width: 90%;
            text-align: center;
        }

        .intro-text {
            font-size: 1.1rem;
            line-height: 1.8;
            margin-bottom: 50px;
            font-weight: 200;
        }

        .highlight {
            color: var(--text-highlight);
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 30px;
        }

        button {
            background: transparent;
            border: 1px solid #333;
            color: var(--text-color);
            padding: 15px 20px;
            font-family: 'Kanit', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 1px;
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        button:hover {
            border-color: var(--text-highlight);
            color: var(--text-highlight);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        #dream-box {
            display: none;
            text-align: left;
            margin-top: 40px;
            padding: 30px;
            border-left: 2px solid var(--blood-red);
            background: linear-gradient(90deg, rgba(102,0,0,0.05) 0%, rgba(0,0,0,0) 100%);
        }

        #dream-text {
            font-size: 1.1rem;
            line-height: 1.9;
            font-weight: 200;
            white-space: pre-wrap;
        }

        .awake-text {
            color: var(--blood-red);
            font-weight: 500;
            margin-top: 30px;
            display: block;
            opacity: 0;
            transition: opacity 2s ease;
        }

        /* Glitch effect ตอนสุ่มฝัน */
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }

        .glitch-anim {
            animation: glitch 0.2s 3;
        }
    </style>
</head>
<body>

    <div class="static-noise"></div>

    <div class="container" id="main-ui">
        <div class="intro-text" id="intro">
            เวลาเที่ยงคืนกำลังจะคืบคลานเข้าสู่ <span class="highlight">วันฉิมประดิษฐ์</span>...<br>
            บรรยากาศภายนอกเงียบสงัด มีเพียงเสียงเม็ดฝนที่เริ่มตกลงมากระทบหลังคา<br>
            คุณทิ้งตัวลงบนเตียงในห้องพักที่ล็อคกลอนอย่างแน่นหนา<br><br>
            คืนนี้... คุณจะปล่อยให้จิตใต้สำนึกทำงาน หรือจะฝืนข่มมันไว้?
        </div>

        <div class="btn-group" id="buttons">
            <button onclick="chooseNoDream()">ข่มจิต ไม่รับรู้สิ่งใด (ไม่ฝัน)</button>
            <button onclick="chooseDream()" style="border-color: #555; color: #ccc;">หลับตา และปล่อยให้มันพาไป (ฝัน)</button>
        </div>

        <div id="dream-box">
            <div id="dream-text"></div>
            <div class="awake-text" id="awake-msg">...จากนั้น คุณก็สะดุ้งตื่นขึ้นมาในห้องที่ว่างเปล่า</div>
        </div>
    </div>

    <script>
        const dreams = [
            // 1. เพชฌฆาต (ดาบ)
            "คุณรู้สึกตัวขึ้นมากลางดึก แต่ขยับตัวไม่ได้ เสียงฝีเท้าหนักๆ ดังขึ้นที่ปลายเตียง ท่ามกลางความมืด คุณเห็นเงาร่างสูงใหญ่ของชายผิวคล้ำ สวมนุ่งโจงกระเบนสีแดงสด ในมือถือดาบเหล็กน้ำพี้เล่มยาวที่ขึ้นสนิมกรัง เขาก้มหน้าลงมาใกล้จนคุณได้กลิ่นคาวเลือดผสมกลิ่นหมาก เขายิ้มแสยะก่อนจะเงื้อดาบขึ้นสุดแขนแล้วกระซิบว่า 'ได้เวลาเซ่นไหว้แล้วไอ้อีทั้งหลาย...'",
            
            // 2. เพชฌฆาต (ลานประหาร)
            "คุณฝันว่าตัวเองถูกมัดติดกับหลักไม้กลางลานกว้าง ฝนกำลังตกหนักจนดินกลายเป็นโคลนสีแดง เสียงปี่พาทย์บรรเลงทำนองโหยหวนผิดเพี้ยนอยู่รอบทิศ ชายร่างยักษ์ในชุดเพชฌฆาตร่ายรำดาบไปรอบๆ ตัวคุณ เสียงกำไลข้อเท้าของเขากระทบกันดังกังวาน เขารำเข้ามาใกล้ขึ้นเรื่อยๆ จนกระทั่งคมดาบเย็นเฉียบทาบลงบนหลังคอของคุณ",
            
            // 3. ฝันดี (ผู้รอดชีวิต)
            "คุณฝันว่าเดินหลงเข้าไปในศาลาไม้สักหลังใหญ่ อากาศเย็นสบายและมีกลิ่นหอมของดอกมะลิตลบอบอวล ชายชราผมขาวสวมชุดขาวสะอาดนั่งยิ้มให้คุณอย่างเมตตา ท่านกวักมือเรียกให้คุณเข้าไปหา ก่อนจะหยิบสายสิญจน์สีขาวที่ผ่านการสวดมนต์มาผูกที่ข้อมือของคุณ ท่านลูบหัวคุณเบาๆ แล้วบอกว่า 'ไม่เป็นไรแล้วลูกเอ๊ย คืนนี้ครูจะคุ้มครองเอ็งเอง หลับให้สบายเถิด...'",
            
            // 4. หอพัก (ระเบียง)
            "คุณฝันว่ากำลังยืนมองออกไปนอกหน้าต่างห้องพักตัวเอง ฝั่งตรงข้ามคือระเบียงห้องที่ไม่มีคนอยู่ แต่คืนนี้... มีกลุ่มคนสวมชุดนางรำโบราณยืนเรียงแถวหน้ากระดานอยู่ตรงนั้น พวกเขาร่ายรำด้วยท่าทางอ่อนช้อยท่ามกลางสายฝนที่สาดกระหน่ำ จู่ๆ นางรำทั้งหมดก็หยุดชะงัก แล้วหันคอขวับมาจ้องมองคุณที่หน้าต่างพร้อมกันด้วยดวงตาที่กลวงโบ๋",
            
            // 5. ประสาทสัมผัส (กลิ่น)
            "คุณฝันว่าตัวเองกำลังนอนอยู่บนเตียงในห้องนี้แหละ ทุกอย่างดูปกติจนกระทั่งคุณได้กลิ่น 'ดอกซ่อนกลิ่น' โชยมาเตะจมูก มันรุนแรงเหมือนมีงานศพจัดอยู่ใต้เตียง คุณพยายามจะลุกขึ้น แต่กลับมีมือเปียกชื้นเย็นเฉียบหลายสิบมือ เอื้อมขึ้นมาจากใต้เตียงและเริ่มตะกุยจับข้อเท้าของคุณ ดึงร่างคุณให้จมลึกลงไปในฟูกนอน",
            
            // 6. กระจก
            "คุณฝันว่าลุกไปเข้าห้องน้ำกลางดึก เมื่อเงยหน้ามองกระจก เงาสะท้อนของคุณกลับไม่ได้ทำท่าทางเหมือนคุณ เงาในกระจกสวม 'ชฎา' เก่าคร่ำคร่า รอยยิ้มฉีกกว้างจนถึงใบหู เลือดสีดำไหลซึมออกจากเบ้าตา มันค่อยๆ ยกมือขึ้นชี้หน้าคุณ แล้วกระซิบผ่านกระจกว่า 'มึง... คือคนต่อไป'",
            
            // 7. เสียงใต้เตียง
            "คุณฝันว่าทำโทรศัพท์มือถือตกลงไปใต้เตียง เมื่อคุณก้มลงไปมองหา คุณไม่ได้เจอโทรศัพท์ แต่เจอใบหน้าของหญิงสาวผิวซีดเซียวที่นอนหงายอยู่ใต้เตียงคุณ เธอกำลังฉีกยิ้มกว้างจนเห็นฟันที่เต็มไปด้วยดินโคลน ก่อนที่เธอจะเริ่มคลานด้วยความเร็วสูงพุ่งตรงเข้ามาหาหน้าคุณ",
            
            // 8. บันไดหนีไฟ
            "ในฝัน สัญญาณไฟไหม้ในหอพักดังลั่น คุณวิ่งหนีลงทางบันไดหนีไฟที่มืดสนิท แต่ไม่ว่าจะวิ่งลงไปกี่ชั้น ตัวเลขบอกชั้นก็ยังคงเป็น 'ชั้น 4' เสมอ เมื่อคุณวิ่งลงมาถึงชั้น 4 เป็นรอบที่สิบ... มีกลุ่มคนสวมชุดไทยโบราณเปื้อนเลือด ยืนขวางบันไดอยู่ พวกเขาถือเชือกบ่วงบาศและแสยะยิ้มรอคุณ",
            
            // 9. รอยเท้าเปียก
            "คุณฝันว่าตื่นขึ้นมาในห้องตัวเอง ประตูล็อคสนิท แต่บนพื้นห้องมี 'รอยเท้าเปียกน้ำ' สีแดงคล้ำ ย่ำเป็นทางจากระเบียงตรงเข้ามาหยุดอยู่ที่ข้างเตียงของคุณ คุณค่อยๆ หันหน้าไปมองข้างเตียง... และพบกับใบหน้าที่เปื่อยยุ่ยกำลังจ้องมองคุณในระยะประชิด",
            
            // 10. ผีอำ (คนทรง)
            "คุณขยับตัวไม่ได้ รู้สึกถึงน้ำหนักมหาศาลกดทับอยู่บนหน้าอก ร่างดำทะมึนของชายชราสวมหัวโขนพญาวานรนั่งคร่อมทับคุณอยู่ เขาก้มหน้าลงมาจนจมูกแทบจะชนกัน ลมหายใจของเขามีกลิ่นเหม็นเน่า เขากระซิบคาถาภาษาโบราณที่ฟังไม่รู้เรื่องด้วยความเร็วสูง และเริ่มใช้นิ้วแหลมคมกรีดลงบนหน้าอกของคุณ",
            
            // 11. เสียงโทรศัพท์
            "ในฝัน โทรศัพท์ของคุณดังขึ้น คุณกดรับสาย ปลายสายคือเสียงของตัวคุณเองที่กำลังร้องไห้ด้วยความหวาดกลัวสุดขีด เสียงนั้นตะโกนใส่คุณว่า 'อย่าลืมตา! อย่าตื่นขึ้นมาเด็ดขาด! พวกมันยืนล้อมเตียงเราไว้หมดแล้ว!!'",
            
            // 12. เพดานห้อง
            "คุณฝันว่าลืมตาขึ้นมามองเพดานห้อง แต่เพดานกลับหายไป กลายเป็นท้องฟ้าสีแดงฉานที่มีพายุฟ้าคะนอง ทันใดนั้น ใบหน้าขนาดยักษ์ของ 'ครูบาอาจารย์' ในอดีตนับสิบคน ก็ชะโงกหน้าลงมามองคุณจากบนฟ้า พวกเขามองคุณเหมือนคุณเป็นเพียงแมลงในกล่องทดลอง ก่อนจะพร้อมใจกันแสยะยิ้ม",
            
            // 13. กล่องดนตรีไทย
            "คุณฝันว่าทีวีในห้องเปิดขึ้นเอง มันฉายภาพนิ่งของวงปี่พาทย์โบราณที่ไม่มีคนเล่น แต่เครื่องดนตรีทุกชิ้นกลับขยับและบรรเลงเพลงเอง จังหวะเพลงเร็วขึ้นเรื่อยๆ และดังขึ้นจนหูคุณแทบแตก ก่อนที่ไม้ตีระนาดจะพุ่งทะลุจอทีวีออกมาเสียบทะลุตาของคุณ",
            
            // 14. เพชฌฆาต (บัญชีหนังหมา)
            "คุณยืนอยู่กลางห้องโถงมืดทึบ เพชฌฆาตร่างใหญ่เดินตรงเข้ามาหาคุณ ในมือถือม้วนคัมภีร์ที่ทำจากหนังมนุษย์ เขาคลี่มันออก กวาดสายตาอ่านชื่อ แล้วเงยหน้ามองคุณ เขาหยิบถ่านสีแดงมารอยขีดที่หน้าผากคุณแล้วกระซิบว่า 'ปีนี้ดวงแข็งนัก... เอาไว้ปีหน้า กูจะมารับมึงไปเป็นเครื่องเซ่น'",
            
            // 15. หุ่นปั้นดิน
            "คุณฝันว่าเจอต๊กตาปั้นดินเผารูปคนตัวเล็กๆ วางอยู่บนหมอน พอคุณหยิบมันขึ้นมา ตุ๊กตาก็เริ่มมีเลือดซึมออกมา ในขณะเดียวกัน คุณกลับรู้สึกว่าร่างกายตัวเองเริ่มแข็งทื่อและเย็นเฉียบเหมือนดินเหนียว คุณกำลังกลายเป็นตุ๊กตา ในขณะที่ตุ๊กตาตัวนั้นค่อยๆ มีเนื้อหนังและกำลังจะขโมยชีวิตของคุณไป"
        ];

        function chooseNoDream() {
            document.body.classList.add('glitch-anim');
            setTimeout(() => {
                document.getElementById('buttons').style.display = 'none';
                document.getElementById('intro').innerHTML = "<span style='color: #444;'>คืนนี้คุณหลับสนิท... ไม่มีสิ่งใดกวนใจ...<br><br>แต่คุณแน่ใจหรือ ว่าคุณอยู่คนเดียวในห้องนี้?</span>";
            }, 300);
        }

        function chooseDream() {
            // ซ่อนปุ่มและข้อความเดิมด้วยเอฟเฟกต์
            document.body.classList.add('glitch-anim');
            
            setTimeout(() => {
                document.body.classList.remove('glitch-anim');
                document.getElementById('buttons').style.display = 'none';
                document.getElementById('intro').style.display = 'none';
                
                const dreamBox = document.getElementById('dream-box');
                dreamBox.style.display = 'block';
                
                // สุ่มความฝัน
                const randomDream = dreams[Math.floor(Math.random() * dreams.length)];
                
                // เอฟเฟกต์ค่อยๆ พิมพ์ (Typewriter)
                typeWriter(randomDream, 0);
            }, 400);
        }

        function typeWriter(text, i) {
            const speed = 35; // ความเร็วในการพิมพ์ (ยิ่งน้อยยิ่งเร็ว)
            if (i < text.length) {
                document.getElementById("dream-text").innerHTML += text.charAt(i);
                i++;
                setTimeout(() => typeWriter(text, i), speed);
            } else {
                // พิมพ์จบแล้ว ค่อยๆ โชว์ประโยคตื่นนอน
                setTimeout(() => {
                    document.getElementById("awake-msg").style.opacity = '1';
                }, 1000);
            }
        }
    </script>
</body>
</html>
